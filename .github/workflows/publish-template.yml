name: Publish changed package (reusable)

on:
  workflow_call:
    inputs:
      is-prerelease:
        description: "Whether the version to publish is a prerelease"
        required: true
        type: boolean

jobs:
  publish_prerelease:
    if: inputs.is-prerelease == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref }}

      - name: Get version and name from csproj file
        id: get_metadata_from_csprojectfile
        uses: Arbeidstilsynet/action-dotnet-get-csproj-metadata@1ce26ff56a71e150145f2f95c235a0d18c899bb7 # v1
        with:
          working-directory: ./src/Publish/Receiver.Publish

      - name: Check if package version exists
        id: nuget_version_check
        uses: Arbeidstilsynet/action-nuget-check-published@4e24ef27f0e3864ce598d1df5c9c28ecdce59208 # v2
        with:
          name: ${{ steps.get_metadata_from_csprojectfile.outputs.name }}
          version: ${{ steps.get_metadata_from_csprojectfile.outputs.version }}
          source-feed: AT.Public.NuGet

      - name: Publish package if not already published
        id: publish
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: Arbeidstilsynet/action-dotnet-publish@8d282653fd85f9a26e80d4f6a4c660eb5d6c8896 # v2
        with:
          working-directory: ./src/Publish/Receiver.Publish
          nuget-auth-token: ${{ secrets.AZURE_DEVOPS_PACKAGING_WRITE_PAT }}

      - name: Docker meta
        if: steps.nuget_version_check.outputs.published == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/arbeidstilsynet/receiver
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.get_metadata_from_csprojectfile.outputs.version }}

      - name: Log in to GHCR
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GHCR)
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./src/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish_release:
    if: inputs.is-prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version and name from csproj file
        id: get_metadata_from_csprojectfile
        uses: Arbeidstilsynet/action-dotnet-get-csproj-metadata@1ce26ff56a71e150145f2f95c235a0d18c899bb7 # v1
        with:
          working-directory: ./src/Publish/Receiver.Publish

      - name: Check if package version exists
        id: nuget_version_check
        uses: Arbeidstilsynet/action-nuget-check-published@4e24ef27f0e3864ce598d1df5c9c28ecdce59208 # v2
        with:
          name: ${{ steps.get_metadata_from_csprojectfile.outputs.name }}
          version: ${{ steps.get_metadata_from_csprojectfile.outputs.version }}
          source-feed: AT.Public.NuGet
          config-file: ./src/nuget.config

      - name: Publish package if not already published
        id: publish
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: Arbeidstilsynet/action-dotnet-publish@8d282653fd85f9a26e80d4f6a4c660eb5d6c8896 # v2
        with:
          working-directory: ./src/Publish/Receiver.Publish
          nuget-auth-token: ${{ secrets.AZURE_DEVOPS_PACKAGING_WRITE_PAT }}
          config-file: ./src/nuget.config

      - name: Docker meta
        if: steps.nuget_version_check.outputs.published == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/arbeidstilsynet/receiver
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.get_metadata_from_csprojectfile.outputs.version }}

      - name: Log in to GHCR
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to NAIS registry
        if: steps.nuget_version_check.outputs.published == 'false'
        id: nais_build_push
        uses: nais/docker-build-push@v0
        with:
          team: meldinger
          docker_context: ./src/
          dockerfile: ./src/Dockerfile
          tag: ${{ steps.get_metadata_from_csprojectfile.outputs.version }}

      - name: Push image to GHCR (from NAIS image)
        if: steps.nuget_version_check.outputs.published == 'false'
        shell: bash
        run: |
          set -euo pipefail

          src_image='${{ steps.nais_build_push.outputs.image }}'
          if [ -z "$src_image" ]; then
            echo "::error::nais/docker-build-push did not produce an image output."
            exit 1
          fi

          # Convert multiline tags into repeated "-t <tag>" args
          args=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            args+=( -t "$tag" )
          done <<< '${{ steps.meta.outputs.tags }}'

          docker buildx imagetools create "${args[@]}" "$src_image"

      - name: Extract changelog section for current version
        if: steps.nuget_version_check.outputs.published == 'false'
        id: changelog
        working-directory: ./src/
        run: |
          VERSION="${{ steps.get_metadata_from_csprojectfile.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              BEGIN {found=0}
              # Match headings like ## 1.2.3 or ## [1.2.3]
              $0 ~ "^##[[:space:]]*\\[?"ver"\\]?" {found=1; print; next}
              found && /^##[[:space:]]*\[?[0-9]+\.[0-9]+\.[0-9]+/ {exit}
              found {print}
            ' CHANGELOG.md > section.txt
            echo 'changelog<<EOF' >> $GITHUB_OUTPUT
            cat section.txt >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          else
            echo 'changelog=No changelog found.' >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.nuget_version_check.outputs.published == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: "${{ steps.get_metadata_from_csprojectfile.outputs.name }}@${{ steps.get_metadata_from_csprojectfile.outputs.version }}"
          name: "${{ steps.get_metadata_from_csprojectfile.outputs.name }} v${{ steps.get_metadata_from_csprojectfile.outputs.version }}"
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}