name: Publish changed packages

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish_when_changed:
    name: Publish if changed
    uses: ./.github/workflows/publish-template.yml
    secrets: inherit
    permissions:
      contents: write
      actions: read
      packages: write
    with:
      is-prerelease: false
